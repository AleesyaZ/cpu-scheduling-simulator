<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CPU Scheduling Simulator</h1>

    <!-- to choose number of processes -->
    <div class="controls">
        <label><strong>Number of Processes (3 to 10): </strong></label>
        <input type="number" id="num-processes" min="3" max="10" value="5">
        <button onclick="generateTable()">Create Table</button>
    </div>

    <!-- input table -->
    <table id="process-table">
        <thead>
            <tr>
                <th>Process ID</th>
                <th>Arrival Time</th>
                <th>Burst Time</th>
                <th>Priority</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <!-- to select one of the four algorithms -->
    <div class="controls">
        <label><strong>Select Algorithm: </strong></label>
        <select id="algo-select" onchange="toggleQuantumField()">
            <option value="FCFS">First-Come-First-Served (FCFS)</option>
            <option value="SJF">Preemptive SJF (SRT)</option>
            <option value="Priority">Non-Preemptive Priority</option>
            <option value="RR">Round Robin</option>
        </select>
        
        <span id="quantum-label">
            <label><strong>Time Quantum: </strong></label>
            <input type="number" id="time-quantum" min="1" value="3">
        </span>
        
        <button onclick="runSimulation()">Simulate</button>
    </div>

    <h2>Gantt Chart</h2>
    <div id="gantt-chart-container" class="gantt-chart"></div>
    <div id="stats-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
